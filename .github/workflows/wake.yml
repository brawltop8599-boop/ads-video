name: Update Playlist and Wake Space
on:
  # schedule:
  #   - cron: '0 */4 * * *'  # Теперь это просто текст, он не работает
  workflow_dispatch:        # Кнопка для ручного запуска останется!

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Download Playlist via Script
        run: |
          # Запускаем ваш умный будильник, который умеет ждать прогрузки
          python main.py

      - name: Commit and Push to GitHub
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add my_list.m3u
          git commit -m "Auto-update playlist" || exit 0
          git push

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Передаем обновленный файл и новый сервер в Space
          git remote add hf https://brawltop8599-boop:$HF_TOKEN@huggingface.co/spaces/videoz/arxiv
          git push --force hf main

      - name: Wake Up Space
        run: |
          # Теперь стучимся точно по адресу
          curl -I "https://hf.space"
