name: Update Playlist and Wake Space
on:
  schedule:
    - cron: '0 */6 * * *' # Обновлять каждые 6 часов
  workflow_dispatch:      # Кнопка для ручного запуска

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          persist-credentials: true

      - name: Download Playlist
        run: |
          # Скачиваем файл и сохраняем его именно как my_list.m3u
          curl -L "http://kb-team.club/?do=/plugin&bid=iptvk&box_client=ottplay-foss&m3u&box_mac=3c2ca6f4437e" -o my_list.m3u

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add my_list.m3u
          # Если изменений нет, скрипт не упадет благодаря || exit 0
          git commit -m "Auto-update playlist" || exit 0
          git push

      - name: Ping HF Space
        run: |
          # Пингуем ваш конкретный адрес, чтобы Space проснулся
          curl -I "https://hf.space"
